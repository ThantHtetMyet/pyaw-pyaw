app = "pyaw-pyaw-api"
primary_region = "sin"

[build]

[env]
  PORT = "8080"
  ROOM_TTL_SECONDS = "300"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [[http_service.checks]]
    interval = "15s"
    timeout = "5s"
    grace_period = "20s"
    method = "GET"
    path = "/health"
