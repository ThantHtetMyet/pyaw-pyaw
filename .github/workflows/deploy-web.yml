name: Deploy Web to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "pyaw-pyaw-web/**"
      - ".github/workflows/deploy-web.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: pyaw-pyaw-web/package-lock.json
      - name: Install dependencies
        run: npm ci
        working-directory: pyaw-pyaw-web
      - name: Build web
        run: npm run build
        working-directory: pyaw-pyaw-web
      - name: Prepare SPA fallback
        run: cp pyaw-pyaw-web/build/index.html pyaw-pyaw-web/build/404.html
      - uses: actions/upload-pages-artifact@v3
        with:
          path: pyaw-pyaw-web/build

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
